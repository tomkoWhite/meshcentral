<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <title>BotChat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f5f5f5;
            color: #222;
        }

        h1 {
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .server {
            font-weight: bold;
            margin-bottom: 6px;
        }

        .timer {
            color: #b00020;
            margin-top: 8px;
        }

        .btn {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #999;
            background: #f0f0f0;
            cursor: pointer;
            text-decoration: none;
            color: #111;
        }
    </style>
</head>
<body>
    <h1>BotChat</h1>

    <div class="card">
        <div class="server">SRV-APP-01</div>
        <div>CPU je nad 95 %</div>
        <div class="timer">Zbývá: 04:32</div>
        <a class="btn" href="#">Open server</a>
    </div>

    <div class="card">
        <div class="server">SRV-DB-01</div>
        <div>Málo místa na disku C:</div>
        <div class="timer">Zbývá: 11:08</div>
        <a class="btn" href="#">Open server</a>
    </div>
</body>
</html>
